name: Deploy static site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Build static artifact
        run: |
          mkdir -p _site/research _site/documents
          cp index.html _site/index.html
          cp research/index.html _site/research/index.html
          cp documents/CV.pdf _site/documents/CV.pdf
          cp documents/CV.pdf _site/documents/CV.pdf
          cp robots.txt _site/robots.txt
          cp sitemap.xml _site/sitemap.xml
          cp googleae605f872d19c047.html _site/googleae605f872d19c047.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
